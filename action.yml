name: AgentShelf
description: Audit product-page snapshots for AI shopping-agent readiness.
inputs:
  path:
    description: File, directory, or glob to scan.
    required: true
  config:
    description: Optional AgentShelf JSON config path.
    required: false
    default: ""
  min-score:
    description: Minimum score required for every scanned page.
    required: false
    default: "70"
  fail-on:
    description: "Optional readiness band gate: weak or not_ready."
    required: false
    default: ""
  format:
    description: "Output format: markdown, json, jsonl, or sarif."
    required: false
    default: markdown
  output:
    description: Report output path.
    required: false
    default: agentshelf-report.md
runs:
  using: composite
  steps:
    - name: Install AgentShelf
      shell: bash
      run: python3 -m pip install "$GITHUB_ACTION_PATH"
    - name: Run AgentShelf scan
      shell: bash
      run: |
        args=(scan "${{ inputs.path }}" --batch)
        if [ -n "${{ inputs.config }}" ]; then
          args+=(--config "${{ inputs.config }}")
        fi
        if [ -z "${{ inputs.config }}" ] || [ "${{ inputs.format }}" != "markdown" ]; then
          args+=(--format "${{ inputs.format }}")
        fi
        if [ -z "${{ inputs.config }}" ] || [ "${{ inputs.min-score }}" != "70" ]; then
          args+=(--min-score "${{ inputs.min-score }}")
        fi
        if [ -n "${{ inputs.fail-on }}" ]; then
          args+=(--fail-on "${{ inputs.fail-on }}")
        fi
        if [ -z "${{ inputs.config }}" ] || [ "${{ inputs.output }}" != "agentshelf-report.md" ]; then
          args+=(--output "${{ inputs.output }}")
        fi
        agentshelf "${args[@]}"
